<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>棉花糖投递提醒</title>
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; }
        img { border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }
            .padding-content {
                padding: 20px !important;
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background: linear-gradient(135deg, #f5f7fa 0%, #f0e6f6 100%);">

    <table border="0" cellpadding="0" cellspacing="0" width="100%">
        <tr>
            <td align="center" style="padding: 40px 0;">

                <table class="email-container" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">

                    <tr>
                        <td height="6" style="background-color: #9b59b6;"></td>
                    </tr>

                    <tr>
                        <td align="center" style="padding: 40px 0 20px 0;">
                            <img src="{{logo_url}}" alt="小猪anna的秘密基地" width="340" style="display: block; font-family: sans-serif; font-size: 15px; color: #333333;">
                        </td>
                    </tr>

                    <tr>
                        <td class="padding-content" style="padding: 20px 50px 40px 50px; text-align: left;">

                            <h1 style="margin: 0 0 20px 0; font-size: 24px; font-weight: bold; color: #333333; text-align: center;">棉花糖投递提醒</h1>

                            <p style="margin: 0 0 15px 0; font-size: 16px; line-height: 1.6; color: #555555;">
                                亲爱的小猪anna：
                            </p>

                            <p style="margin: 0 0 25px 0; font-size: 16px; line-height: 1.6; color: #555555;">
                                有人向你投递了一颗新的棉花糖，请及时查看。
                            </p>

                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding: 20px 0;">
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f8f4fb; border: 1px solid #eadff0; border-radius: 8px;">
                                            <tr>
                                                <td style="padding: 18px 24px; font-size: 15px; line-height: 1.7; color: #555555;">
                                                    <p style="margin: 0 0 10px 0;">
                                                        <strong style="color: #7d3c98;">投递人：</strong>{{sender}}
                                                    </p>
                                                    <p style="margin: 0 0 10px 0;">
                                                        <strong style="color: #7d3c98;">标题：</strong>{{title}}
                                                    </p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 25px 0 10px 0; font-size: 14px; line-height: 1.6; color: #888888; text-align: center;">
                                请登录小猪anna的秘密基地后台，在“棉花糖”中查看完整内容并回复。
                            </p>

                            <hr style="border: 0; border-top: 1px solid #eeeeee; margin: 30px 0;">

                            <p style="margin: 0; font-size: 14px; line-height: 1.6; color: #999999; text-align: center;">
                                这是一封自动提醒邮件，请勿直接回复。
                            </p>
                        </td>
                    </tr>
                </table>

                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-top: 20px;">
                    <tr>
                        <td align="center" style="font-size: 12px; color: #999999; line-height: 1.5;">
                            <p style="margin: 0;">© 2026 Linus_Lieu. All rights reserved.</p>
                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

</body>
</html>
